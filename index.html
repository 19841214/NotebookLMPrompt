<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Mega Prompts 儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --accent-morandi-blue: #a3b18a; 
            --accent-morandi-gray: #cad2c5;
            --accent-glow: rgba(163, 177, 138, 0.2);
            --whitespace: 60px;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.03);
            --card-hover-shadow: 0 20px 60px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        #p5-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.6;
        }

        /* Sidebar - Enhanced Glassmorphism */
        aside {
            width: 300px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: var(--whitespace);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 60px;
            color: var(--text-primary);
            border-left: 3px solid var(--accent-morandi-blue);
            padding-left: 15px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 25px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav li span {
            font-size: 0.7rem;
            opacity: 0.3;
            font-weight: 300;
        }

        nav li:hover, nav li.active {
            color: var(--text-primary);
            padding-left: 10px;
        }

        nav li.active::after {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            width: 4px;
            height: 4px;
            background: var(--accent-morandi-blue);
            border-radius: 50%;
            transform: translateY(-50%);
        }

        /* Main Content */
        main {
            margin-left: 300px;
            padding: var(--whitespace) 8%;
            width: calc(100% - 300px);
            min-height: 100vh;
        }

        .header-section {
            margin-bottom: 100px;
            max-width: 900px;
        }

        .header-section h1 {
            font-size: 4rem;
            font-weight: 200;
            margin-bottom: 25px;
            letter-spacing: -2px;
            opacity: 0;
            line-height: 1;
        }

        .header-section p {
            font-size: 1rem;
            line-height: 2;
            color: var(--text-secondary);
            opacity: 0;
            max-width: 600px;
        }

        /* Cards Grid */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 50px;
        }

        .card {
            background: #ffffff;
            padding: 50px;
            border-radius: 4px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.02);
            opacity: 0;
            display: flex;
            flex-direction: column;
            position: relative;
            will-change: transform, opacity;
            /* FIX: transform 由 GSAP 全權接管，不設 CSS transition 避免衝突抖動 */
            transition: box-shadow 0.4s ease;
        }

        .card:hover {
            box-shadow: var(--card-hover-shadow);
        }

        /* Subtle Glow Overlay */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--accent-glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none; 
            z-index: 0;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content-wrapper {
            position: relative;
            z-index: 10; /* High z-index to stay above the glow */
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-morandi-blue);
            margin-bottom: 20px;
            font-weight: 700;
            opacity: 0; 
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.4;
            opacity: 0; 
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 40px;
            flex-grow: 1;
            opacity: 0; 
        }

        .copy-btn {
            background: var(--text-primary);
            color: #fff;
            border: none;
            padding: 14px 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.3s ease;
            position: relative;
            z-index: 20; /* Very high z-index to ensure it's always the topmost clickable item */
            opacity: 0; 
            /* Remove translateZ as it causes hit-box detachment in Safari/Chrome during 3D parent transforms */
        }

        .copy-btn:hover {
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transform: translateY(-2px); /* Use Y instead of Z for stable hitboxes */
        }

        .copy-btn.copied {
            background: var(--accent-morandi-blue);
        }

        /* Success Message Overlay */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: #fff;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @media (max-width: 1024px) {
            aside { width: 80px; padding: 40px 10px; }
            .logo, nav li span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
            .cards-container { grid-template-columns: 1fr; }
        }

        /* FIX: 手機版 — sidebar 改成底部橫向 tab bar */
        @media (max-width: 767px) {
            aside {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                top: auto;
                left: 0;
                padding: 10px 16px 14px;
                border-right: none;
                border-top: 1px solid rgba(0,0,0,0.07);
                z-index: 20;
            }
            .logo { display: none; }
            nav ul {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            nav ul::-webkit-scrollbar { display: none; }
            nav li {
                margin-bottom: 0;
                white-space: nowrap;
                font-size: 0.72rem;
                padding: 7px 14px;
                background: rgba(0,0,0,0.04);
                border-radius: 20px;
                letter-spacing: 0.5px;
                justify-content: center;
            }
            nav li.active {
                background: var(--text-primary);
                color: #fff;
                padding-left: 14px;
            }
            nav li.active::after { display: none; }
            nav li span { display: none; }
            main {
                margin-left: 0;
                width: 100%;
                padding: 30px 5% 110px;
            }
            .header-section { margin-bottom: 50px; }
            .header-section h1 { font-size: 2.4rem; letter-spacing: -1px; }
            .card { padding: 32px; }
            .card-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="p5-canvas"></div>

    <aside>
        <div class="logo">NB-LM PROMPTS</div>
        <nav>
            <ul id="category-nav">
                <li class="active" data-category="all">全部情境 <span>ALL</span></li>
                <li data-category="academic">學術解析 <span>ACADEMIC</span></li>
                <li data-category="story">趣味教學 <span>STORY</span></li>
                <li data-category="tech">實作指南 <span>TECH</span></li>
                <li data-category="official">正式報告 <span>OFFICIAL</span></li>
                <li data-category="portfolio">成果展示 <span>SHOWCASE</span></li>
            </ul>
        </nav>
    </aside>

    <main>
        <section class="header-section">
            <h1 id="main-title">教師專用 Mega Prompts</h1>
            <p id="main-subtitle">結合視覺美學與教學邏輯的 25 種 NotebookLM 提示詞庫。點擊按鈕即可一鍵複製，為您的課堂帶來影視級的簡報體驗。</p>
        </section>

        <div class="cards-container" id="cards-container">
            <!-- Cards will be injected by JavaScript -->
        </div>
    </main>

    <div id="toast">已成功複製到剪貼簿</div>

    <script>
        const promptsData = [
            // ACADEMIC
            {
                id: 1,
                category: "academic",
                tag: "Academic Deep Dive",
                title: "反重力極簡風 (Anti-Gravity)",
                desc: "Apple 研究簡報風格。極高留白空間，標題與正文比例達 10:1。每一頁只呈現一個核心洞察。",
                content: `你是一位專業的研究簡報設計師。請將以下資料轉化為「反重力極簡主義」風格的展示簡報。
【視覺規範】：
- 背景：使用純白色 (#FFFFFF)。
- 布局：所有文字嚴格靠左對齊，保持極高的留白空間（至少 60%）。
- 字體比例：主標題字體與正文比例需達到 10:1。標題使用巨大且粗重的無襯線字體。
- 色彩：僅在標註重點時使用細小的青藍色 (#00FFFF) 短線或點。
【內容邏輯】：
- 每一頁只處理一個核心科學洞察或研究發現。
- 嚴禁使用條列式清單，請將內容轉化為短促、精煉的陳述句。
【排除規則】：
- 絕對禁止使用 Markdown 符號（如 #, *, -），請提供純文字。
- 語言：繁體中文，學術專有名詞後方請括號標註英文。`
            },
            {
                id: 2,
                category: "academic",
                tag: "Academic Deep Dive",
                title: "經典明體雜誌風 (Oxford Journal)",
                desc: "學術期刊編輯風格。淺米色背景，明體/襯線體排版，雙欄設計，具備學術權威感。",
                content: `請扮演學術期刊編輯。將資料轉化為「牛津期刊風格」的正式簡報。
【視覺規範】：
- 背景：淺米色 (#F5F5DC)。
- 字體：標題使用精緻、優雅的襯線體 (Serif/明體)，字距加寬。
- 布局：模擬雙欄排版，左側放置導言，右側放置核心論點。
【裝飾元素】：
- 在頁面角落標註細小的頁碼與「Journal of Education Reserach」等裝飾文字。
- 使用細長的水平黑線作為分節符號。
【內容邏輯】：
- 語氣必須具備學術權威感，使用「綜上所述」、「實證發現」等專業用語。
【語言】：繁體中文。絕對禁止 Markdown。`
            },
            {
                id: 3,
                category: "academic",
                tag: "Academic Deep Dive",
                title: "黃黑前衛編輯風 (Yellow Editorial)",
                desc: "時尚雜誌美術指導風格。高對比黃黑配色，不對稱排版，視覺轟炸感十足。",
                content: `你是一位時尚雜誌美術指導。請將以下資料轉化為「大膽高對比編輯風格」。
【視覺規範】：
- 配色：鮮黃底 (#FFFF00) 配亮黑字 (#000000)。
- 排版：使用不對稱網格。標題文字必須「溢出」常規邊距，展現強烈的視覺張力。
- 字體：使用超重型字體 (Heavy weight)，關鍵字前方加上實心的黑色圓點或箭頭。
【內容邏輯】：
- 用於強調研究中的「核心衝突」與「重大突破」。
- 每一頁的文字不超過 30 字，追求極致的重點轟炸。
【要求】：純文字輸出，排除所有 Markdown 格式。`
            },
            {
                id: 4,
                category: "academic",
                tag: "Academic Deep Dive",
                title: "銳利建築感 (Sharp Minimalism)",
                desc: "建築師風格。結構化藍圖，細黑線框架，邏輯圖表感，去除冗餘形容詞。",
                content: `請扮演建築師。將以下教材轉化為「結構化建築藍圖」風格。
【視覺規範】：
- 背景：淺灰色 (#E9E9E9)。
- 邊框：每一頁都要有一個細黑線構成的「框架」，內容嚴格在框架內。
- 字體：使用等寬字體 (Monospace)，強調準確度。
- 布局：內容按 1:2 的黃金比例切割，左側為「問題定義」，右側為「結構化解答」。
【內容邏輯】：
- 以邏輯圖表感呈現，每個論點之間使用「>>>」符號連結。
【語言】：繁體中文。排除所有 Markdown 符號。`

            {

                tag: "Academic Deep Dive",
                title: "知識圖譜風 (Knowledge Map)",
                desc: "資訊架構師風格。放射狀知識圖譜，重視因果關係與層次，適合非線性思維呈現。",

【視覺規範】：
- 核心：將最重要的核心概念放在頁面中心。
- 分支：子概念以放射狀延伸，使用 [Concept A] --- (Relationship) --- [Concept B] 的文字連結感。
- 標籤：使用小括號作為標記點。
【內容邏輯】：
- 重視因果關係與層次結構，而非線性敘述。
- 在每個分支末梢，提供一個具體的教學應用案例。
【語言】：繁體中文。嚴禁 Markdown。`

            {
                id: 6,
                category: "story",
                tag: "Classroom Fun",
                title: "日系漫畫風 (Manga Narrative)",

【內容邏輯】：
- 將理論擬人化，例如：「光合作用」是一場獲取能量的戰鬥。
【要求】：語言生動、熱血、繁體中文。排除 Markdown。`

            {

                category: "story",
                tag: "Classroom Fun",
                title: "維他命流行風 (Vitamin Pop)",
                desc: "TikTok 社群編輯風格。高飽和霓虹配色，雲朵形狀標籤，輕快 SNS 口語化。",

- 配色：薄荷綠、霓虹粉、陽光橙的高飽和混合。

【要求】：繁體中文。排除 Markdown。`

            {
                id: 10,
                category: "story",
                tag: "Classroom Fun",

【內容邏輯】：
- 透過數值化與角色化，讓學生快速掌握該知識點的強度與用途。
【要求】：繁體中文。排除 Markdown。`
            },

            // TECH
            {
                id: 11,
                category: "tech",
                tag: "Workshop Guide",
                title: "新復古開發手冊 (Neo-Retro Dev)",
                desc: "90年代工程師風格。Windows 早期介面感，網格紙背景，厚重陰影，純功能導向。",
                content: `請扮演 1990 年代的軟體工程師。將此指南轉化為「新復古開發者簡報」。

        // p5.js Reactive Flow Field Background
        new p5((p) => {
            let particles = [];
            const num = 60;
            const noiseScale = 0.01;

            p.setup = () => {
                const canvas = p.createCanvas(p.windowWidth, p.windowHeight);
                canvas.parent('p5-canvas');
                for(let i=0; i<num; i++) {
                    particles.push(p.createVector(p.random(p.width), p.random(p.height)));
                }
                p.strokeWeight(1.5);
            };

            p.draw = () => {
                p.clear();
                p.stroke(163, 177, 138, 40); // Morandi Sage with low alpha
                
                for(let i=0; i<num; i++) {
                    let p_vec = particles[i];
                    let n = p.noise(p_vec.x * noiseScale, p_vec.y * noiseScale, p.frameCount * 0.005);
                    let a = p.TAU * n;
                    
                    // Mouse influence
                    let d = p.dist(p.mouseX, p.mouseY, p_vec.x, p_vec.y);
                    if (d < 200) {
                        let angleToMouse = p.atan2(p.mouseY - p_vec.y, p.mouseX - p_vec.x);
                        a = p.lerp(a, angleToMouse, 0.1);
                    }

                    p_vec.x += p.cos(a) * 0.8;
                    p_vec.y += p.sin(a) * 0.8;
                    
                    if(!onScreen(p_vec)) {
                        p_vec.x = p.random(p.width);
                        p_vec.y = p.random(p.height);
                    }
                    
                    p.point(p_vec.x, p_vec.y);
                }
            };

            function onScreen(v) {
                return v.x >= 0 && v.x <= p.width && v.y >= 0 && v.y <= p.height;
            }

            p.windowResized = () => p.resizeCanvas(p.windowWidth, p.windowHeight);
        });

        // Dashboard Core Logic
        const container = document.getElementById('cards-container');
        const navItems = document.querySelectorAll('#category-nav li');
        const toast = document.getElementById('toast');

        function renderCards(filter = 'all') {
            container.innerHTML = '';
            const filtered = filter === 'all' ? promptsData : promptsData.filter(p => p.category === filter);
            
            filtered.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.category = data.category;
                
                card.innerHTML = `
                    <div class="card-content-wrapper">
                        <div class="card-tag">${data.tag}</div>
                        <div class="card-title">${data.title}</div>
                        <div class="card-desc">${data.desc}</div>
                        <button class="copy-btn" data-id="${data.id}">COPY MEGA PROMPT</button>
                    </div>
                `;
                
                // Attach Magnetic Listeners
                card.addEventListener('mousemove', handleCardMove);
                card.addEventListener('mouseleave', handleCardLeave);
                
                container.appendChild(card);
            });

            // GSAP Cinematic Entrance — FIX: 移除 filter:blur（GPU repaint 殺手），改用 opacity+y
            const cards = container.querySelectorAll('.card');
            gsap.fromTo(cards, 
                { opacity: 0, y: 50, rotateX: 8 }, 
                { opacity: 1, y: 0, rotateX: 0, stagger: 0.08, duration: 1.0, ease: "power4.out" }
            );

            // Staggered Inner Elements Entrance — FIX: 用 container 範圍選取，避免選到舊卡片
            const innerEls = container.querySelectorAll('.card-tag, .card-title, .card-desc, .copy-btn');
            gsap.fromTo(innerEls, 
                { opacity: 0, y: 15 }, 
                { opacity: 1, y: 0, stagger: 0.04, duration: 0.7, ease: "power3.out", delay: 0.15 }
            );
        }

        // Glow tracking only — tilt 已移除
        function handleCardMove(e) {
            const card = e.currentTarget;
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${(x / rect.width) * 100}%`);
            card.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);
        }

        function handleCardLeave(e) {
            // glow 透過 CSS :hover 控制，離開時自動消失
        }

        // 事件委派：掛在 container 上，不受 renderCards 清空 innerHTML 影響
        container.addEventListener('click', (e) => {
            const btn = e.target.closest('.copy-btn');
            if (!btn) return;
            e.stopPropagation();
            const id = parseInt(btn.dataset.id, 10);
            const item = promptsData.find(p => p.id === id);
            if (!item) return;

            // execCommand 在 file:// 環境最穩定，先用它；HTTPS 環境則用 clipboard API
            function doExecCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                let ok = false;
                try { ok = document.execCommand('copy'); } catch(e) {}
                document.body.removeChild(ta);
                return ok;
            }

            if (navigator.clipboard && location.protocol !== 'file:') {
                navigator.clipboard.writeText(item.content)
                    .then(() => showCopySuccess(btn))
                    .catch(() => {
                        // clipboard API 失敗時降級
                        if (doExecCopy(item.content)) showCopySuccess(btn);
                    });
            } else {
                if (doExecCopy(item.content)) showCopySuccess(btn);
            }
        });

        function showCopySuccess(btn) {
            if (btn._copying) return; // 防止連點重複觸發
            btn._copying = true;
            btn.classList.add('copied');
            const originalText = btn.innerText;
            btn.innerText = 'COPIED!';
            
            gsap.to(toast, { y: -40, opacity: 1, duration: 0.6, ease: "back.out(1.7)" });
            setTimeout(() => {
                gsap.to(toast, { y: 100, opacity: 0, duration: 0.4, ease: "power2.in" });
                btn.classList.remove('copied');
                btn.innerText = originalText;
                btn._copying = false;
            }, 2000);
        }

        // Navigation
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                if(item.classList.contains('active')) return;
                
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                // FIX: 移除 filter:blur，改用 opacity+y
                gsap.to(".card", {
                    opacity: 0,
                    y: -20,
                    stagger: 0.04,
                    duration: 0.35,
                    ease: "power2.in",
                    onComplete: () => renderCards(item.dataset.category)
                });
                
                gsap.fromTo("#main-title", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 1, ease: "power4.out" });
            });
        });

        // DOMContentLoaded：不等外部 CDN 資源，DOM 就緒即啟動
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to("#main-title",    { opacity: 1, duration: 1.5, delay: 0.2, ease: "power4.out" });
            gsap.to("#main-subtitle", { opacity: 1, duration: 1.5, delay: 0.4, ease: "power4.out" });
            renderCards();
        });

    </script>
